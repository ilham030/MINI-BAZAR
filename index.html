<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MİNİBAZAR</title>
    <!-- Modern Dizayn üçün Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- İkonlar üçün FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

    <!-- 1. NAVİQASİYA (HEADER) -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#" class="text-2xl font-black text-indigo-600 tracking-wider">MEGASTORE</a>
            
            <!-- Səbət Düyməsi -->
            <button onclick="toggleCartModal()" class="relative bg-indigo-50 text-indigo-600 p-3 rounded-full hover:bg-indigo-100 transition">
                <i class="fa-solid fa-shopping-bag text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
            </button>
        </div>
    </header>

    <!-- 2. KATEQORİYALAR MƏNYUSU -->
    <section class="max-w-7xl mx-auto px-4 mt-6">
        <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-none" id="category-filters">
            <button onclick="filterCategory('all')" class="cat-btn bg-indigo-600 text-white px-5 py-2 rounded-full text-sm font-medium shadow-sm whitespace-nowrap">Hamısı</button>
            <button onclick="filterCategory('elektronika')" class="cat-btn bg-white text-gray-600 border border-gray-200 px-5 py-2 rounded-full text-sm font-medium hover:bg-gray-50 whitespace-nowrap">Elektronika</button>
            <button onclick="filterCategory('geyim')" class="cat-btn bg-white text-gray-600 border border-gray-200 px-5 py-2 rounded-full text-sm font-medium hover:bg-gray-50 whitespace-nowrap">Geyim</button>
            <button onclick="filterCategory('çanta')" class="cat-btn bg-white text-gray-600 border border-gray-200 px-5 py-2 rounded-full text-sm font-medium hover:bg-gray-50 whitespace-nowrap">Çanta</button>
            <button onclick="filterCategory('mebel')" class="cat-btn bg-white text-gray-600 border border-gray-200 px-5 py-2 rounded-full text-sm font-medium hover:bg-gray-50 whitespace-nowrap">Mebel</button>
        </div>
    </section>

    <!-- 3. MƏHSULLAR ŞƏBƏKƏSİ -->
    <main class="max-w-7xl mx-auto px-4 my-8">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="products-grid">
            <!-- Məhsullar bura dinamik olaraq JavaScript vasitəsilə gələcək -->
        </div>
    </main>

    <!-- 4. SƏBƏT MODAL (PƏNCƏRƏSİ) -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex justify-end transition-opacity">
        <div class="bg-white w-full max-w-md h-full flex flex-col p-6 shadow-2xl animate-slide-in">
            <div class="flex justify-between items-center border-b pb-4">
                <h3 class="text-xl font-bold text-gray-800">Sizin Səbətiniz</h3>
                <button onclick="toggleCartModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            
            <!-- Səbətdəki məhsulların siyahısı -->
            <div id="cart-items" class="flex-1 overflow-y-auto py-4 space-y-4">
                <p class="text-gray-500 text-center py-8">Səbətiniz boşdur.</p>
            </div>

            <!-- Cəmi qiymət və Sifariş Düyməsi -->
            <div class="border-t pt-4">
                <div class="flex justify-between items-center text-lg font-bold text-gray-900 mb-4">
                    <span>Cəmi Məbləğ:</span>
                    <span id="cart-total">0.00 AZN</span>
                </div>
                <button onclick="checkoutViaWhatsApp()" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-emerald-600 transition shadow-lg">
                    <i class="fa-brands fa-whatsapp text-xl"></i>
                    WhatsApp ilə Sifariş Et
                </button>
            </div>
        </div>
    </div>

    <!-- 5. MAĞAZANIN MƏNTİQİ (JAVASCRIPT) -->
    <script>
        // Sizin WhatsApp nömrəniz (Beynəlxalq formatda, məs: 99450XXXXXXX)
        const WHATSAPP_NUMBER = "994773911300"; 

        // Nümunə Məhsul Bazası (İstədiyiniz qədər artıra bilərsiniz)
        const products = [
            { id: 1, name: "İphone 17 pro", price: 3030, category: "elektronika", img: "https://i.postimg.cc/T3Qc46T3/Gemini-Generated-Image-d1fnxgd1fnxgd1fn.png" },
            { id: 2, name: "Televizor", price: 285, category: "elektronika", img: "https://i.postimg.cc/HLxg7dS5/Gemini-Generated-Image-3j0myl3j0myl3j0m.png" },
            { id: 3, name: "Zərif don", price: 25.00, category: "geyim", img: "https://i.postimg.cc/g2f0dwzg/Whats-App-Image-2026-07-18-at-22-21-17.jpg" },
            { id: 4, name: "Eko dəri çanta", price: 35.00, category: "çanta", img: "https://i.postimg.cc/wvY351nf/Whats-App-Image-2026-07-18-at-22-22-43.jpg" },
            { id: 5, name: "Sifarişlə yığılır", price: 0, category: "mebel", img: "https://i.postimg.cc/d3tsnr61/Whats-App-Image-2026-07-18-at-22-21-53.jpg" }
        ];

        let cart = [];

        // Məhsulları ekrana çıxaran funksiya
        function displayProducts(productsToRender) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            productsToRender.forEach(product => {
                grid.innerHTML += `
                    <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 hover:shadow-md transition flex flex-col">
                        <div class="h-48 overflow-hidden bg-gray-100">
                            <img src="${product.img}" alt="${product.name}" class="w-full h-full object-cover">
                        </div>
                        <div class="p-4 flex flex-col flex-1 justify-between">
                            <div>
                                <span class="text-xs text-gray-400 uppercase font-bold tracking-wider">${product.category}</span>
                                <h4 class="text-gray-800 font-semibold mt-1">${product.name}</h4>
                            </div>
                            <div class="flex justify-between items-center mt-4">
                                <span class="text-indigo-600 font-black text-lg">${(product.price || 0).toFixed(2)} AZN</span>
                                <button onclick="addToCart(${product.id})" class="bg-indigo-600 text-white p-2 rounded-lg hover:bg-indigo-700 transition">
                                    <i class="fa-solid fa-cart-plus"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Kateqoriya Süzgəci
        function filterCategory(category) {
            // Düymələrin rənglərini tənzimləmək
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('bg-white', 'text-gray-600', 'border');
            });
            event.target.classList.remove('bg-white', 'text-gray-600', 'border');
            event.target.classList.add('bg-indigo-600', 'text-white');

            if(category === 'all') {
                displayProducts(products);
            } else {
                const filtered = products.filter(p => p.category === category);
                displayProducts(filtered);
            }
        }

        // Səbətə məhsul əlavə edilməsi
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const cartItem = cart.find(item => item.id === id);

            if(cartItem) {
                cartItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartUI();
        }

        // Səbət interfeysinin yenilənməsi
        function updateCartUI() {
            // Səbətdəki mal sayı
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').innerText = count;

            // Siyahı
            const cartItemsContainer = document.getElementById('cart-items');
            if(cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="text-gray-500 text-center py-8">Səbətiniz boşdur.</p>';
            } else {
                cartItemsContainer.innerHTML = '';
                cart.forEach(item => {
                    cartItemsContainer.innerHTML += `
                        <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl">
                            <div>
                                <h5 class="font-semibold text-gray-800 text-sm">${item.name}</h5>
                                <span class="text-xs text-gray-500">${(item.price || 0).toFixed(2)} AZN x ${item.quantity}</span>
                            </div>
                            <button onclick="removeFromCart(${item.id})" class="text-red-500 hover:text-red-700 font-bold text-sm">Sil</button>
                        </div>
                    `;
                });
            }

            // Cəmi qiymət
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cart-total').innerText = total.toFixed(2) + " AZN";
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
        }

        function toggleCartModal() {
            const modal = document.getElementById('cart-modal');
            modal.classList.toggle('hidden');
        }

        // WhatsApp-a Sifarişin Göndərilməsi (Ən kritik hissə)
        function checkoutViaWhatsApp() {
            if(cart.length === 0) {
                alert("Səbətiniz boşdur!");
                return;
            }

            let message = "🛒 *YENİ SİFARİŞ*\n\n";
            cart.forEach((item, index) => {
                message += `${index + 1}. *${item.name}* (Kateqoriya: ${item.category})\n`;
                message += `   ${item.quantity} ədəd x ${(item.price || 0).toFixed(2)} AZN\n\n`;
            });

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            message += `💰 *Cəmi Məbləğ:* ${total.toFixed(2)} AZN\n\n`;
            message += "Sifarişimi təsdiq etmək istəyirəm. Zəhmət olmasa çatdırılma barədə məlumat verin.";

            // Kodu linkə uyğunlaşdırmaq (URL Encode)
            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMessage}`;

            // İzləyicini WhatsApp-a yönləndirir
            window.open(whatsappUrl, '_blank');
        }

        // Sayt açılanda məhsulları yüklə
        displayProducts(products);
    </script>
</body>
</html>
