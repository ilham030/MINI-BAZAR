<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MİNİBAZAR - Onlayn Alış-veriş Mağazası">
    <title>MİNİBAZAR - Alış-veriş</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome İkonlar -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Özel CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans">

    <!-- NAVİQASİYA (HEADER) -->
    <header class="bg-white shadow-sm sticky top-0 z-50" role="banner">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#main-content" class="text-2xl font-black text-indigo-600 tracking-wider hover:text-indigo-700 transition">
                🛍️ MİNİBAZAR
            </a>
            
            <!-- Səbət Düyməsi -->
            <button 
                id="cart-toggle-btn" 
                onclick="toggleCartModal()" 
                class="relative bg-indigo-50 text-indigo-600 p-3 rounded-full hover:bg-indigo-100 transition focus:ring-2 focus:ring-indigo-600 focus:outline-none"
                aria-label="Alış-veriş səbətini aç"
                aria-expanded="false">
                <i class="fa-solid fa-shopping-bag text-xl"></i>
                <span 
                    id="cart-count" 
                    class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold"
                    aria-live="polite">0</span>
            </button>
        </div>
    </header>

    <div id="main-content" class="flex-1">
        <!-- KATEQORİYALAR MƏNYUSU -->
        <section class="max-w-7xl mx-auto px-4 mt-6" aria-label="Məhsul Kateqoriyaları">
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-none" id="category-filters" role="tablist">
                <!-- Kateqoriya düymələri JavaScript tərəfindən doldurulur -->
            </div>
        </section>

        <!-- MƏHSULLAR ŞƏBƏKƏSI -->
        <main class="max-w-7xl mx-auto px-4 my-8" aria-label="Məhsullar Kataloqu">
            <!-- Yüklənmə göstəricisi -->
            <div id="loading-spinner" class="text-center py-12">
                <div class="inline-block">
                    <i class="fas fa-spinner fa-spin text-4xl text-indigo-600"></i>
                </div>
            </div>

            <!-- Məhsul şəbəkəsi -->
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="products-grid" role="region" aria-label="Məhsullar">
                <!-- Məhsullar buraya dinamik olaraq yerləşdirilir -->
            </div>

            <!-- Boş hal mesajı -->
            <div id="empty-state" class="text-center py-12 hidden">
                <i class="fas fa-inbox text-5xl text-gray-300 mb-4 block"></i>
                <p class="text-gray-500 text-lg">Bu kateqoriyada məhsul yoxdur.</p>
            </div>
        </main>
    </div>

    <!-- SƏBƏT MODAL (PƏNCƏRƏSİ) -->
    <div 
        id="cart-modal" 
        class="hidden fixed inset-0 bg-black/50 z-50 flex justify-end transition-opacity cart-modal"
        role="dialog"
        aria-labelledby="cart-title"
        aria-hidden="true">
        <div class="bg-white w-full max-w-md h-full flex flex-col p-6 shadow-2xl slide-in-right">
            <!-- Başlıq -->
            <div class="flex justify-between items-center border-b pb-4">
                <h2 id="cart-title" class="text-xl font-bold text-gray-800">🛒 Sizin Səbətiniz</h2>
                <button 
                    onclick="toggleCartModal()" 
                    class="text-gray-400 hover:text-gray-600 text-2xl focus:ring-2 focus:ring-gray-400 rounded p-1 focus:outline-none"
                    aria-label="Səbətini kapat">
                    &times;
                </button>
            </div>
            
            <!-- Səbətdəki məhsullar -->
            <div id="cart-items" class="flex-1 overflow-y-auto py-4 space-y-4" role="list">
                <p class="text-gray-500 text-center py-8">Səbətiniz boşdur.</p>
            </div>

            <!-- Cəmi qiymət və Sifariş Düyməsi -->
            <div class="border-t pt-4 space-y-4">
                <div class="flex justify-between items-center text-lg font-bold text-gray-900">
                    <span>Cəmi Məbləğ:</span>
                    <span id="cart-total" class="text-indigo-600">0.00 AZN</span>
                </div>
                
                <button 
                    id="checkout-btn"
                    onclick="checkoutViaWhatsApp()" 
                    class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-emerald-600 transition focus:ring-2 focus:ring-emerald-600 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed"
                    aria-label="WhatsApp ilə sifariş et">
                    <i class="fa-brands fa-whatsapp text-xl"></i>
                    <span>WhatsApp ilə Sifariş Et</span>
                </button>

                <!-- Yüklənmə durumu -->
                <div id="checkout-loading" class="hidden text-center text-sm text-gray-500">
                    <i class="fas fa-spinner fa-spin"></i> Hazırlanır...
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Bildirişi -->
    <div id="toast" class="hidden fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50 toast-message">
        <span id="toast-text"></span>
    </div>

    <!-- Skriptlər -->
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
